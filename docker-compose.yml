services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: factcheck
      POSTGRES_USER: factcheck
      POSTGRES_PASSWORD: factcheck
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  factcheck:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://factcheck:factcheck@postgres:5432/factcheck
      HOST: "0.0.0.0"
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  pgdata:
